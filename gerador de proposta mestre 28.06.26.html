<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#06253D;--navy2:#0B2545;--gold:#C9A84C;--gold-bg:#FBF5E6;
  --bg:#F0F2F5;--white:#fff;--text:#1A2332;--muted:#6B7280;
  --border:#E5E7EB;--r:14px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.hdr{background:var(--navy);padding:14px 28px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr h1{color:#fff;font-size:1rem;font-weight:700;line-height:1.2}
.hdr span{color:rgba(255,255,255,.55);font-size:.72rem}
.hdr-badge{margin-left:auto;background:rgba(201,168,76,.18);border:1px solid rgba(201,168,76,.45);color:var(--gold);font-size:.7rem;padding:3px 10px;border-radius:20px;white-space:nowrap}
.hdr-key{margin-left:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);font-size:.7rem;padding:3px 10px;border-radius:20px;cursor:pointer;white-space:nowrap}
main{max-width:860px;margin:22px auto;padding:0 14px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--white);border-radius:var(--r);padding:22px 26px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--gold)}
.sec-ico{font-size:1rem}
.sec-ttl{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text)}
label{display:block;font-size:.75rem;font-weight:700;color:var(--navy);margin-bottom:5px}
.lbl-opt{font-weight:400;color:var(--muted);font-size:.68rem;margin-left:3px}
.hint{font-size:.7rem;color:var(--muted);margin-bottom:7px;line-height:1.45}
input[type=text],input[type=number],input[type=date],input[type=password],textarea{
  width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-size:.84rem;font-family:inherit;color:var(--text);background:var(--white);
  transition:border .2s,box-shadow .2s;
}
input:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:580px){.row2,.row3{grid-template-columns:1fr}}
.field{margin-bottom:14px}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.chip{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:.76rem;color:var(--muted);background:var(--white);cursor:pointer;transition:all .15s;line-height:1.4;font-family:inherit}
.chip:hover{border-color:var(--gold);color:var(--text)}
.chip.sel{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700}
.num-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.nc{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:.82rem;color:var(--text);background:var(--white);cursor:pointer;transition:all .15s;min-width:46px;text-align:center;font-family:inherit}
.nc:hover{border-color:var(--gold)}
.nc.sel{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700}
.price-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pc{padding:4px 12px;border-radius:20px;border:1px solid #BFDBFE;font-size:.72rem;color:#1E40AF;background:#EFF6FF;cursor:pointer;transition:all .15s;font-family:inherit}
.pc:hover{background:#1D4ED8;color:#fff;border-color:#1D4ED8}

/* EQUIPE CARDS */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:540px){.team-grid{grid-template-columns:1fr}}
.tc{border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .18s;display:flex;gap:10px;align-items:flex-start;background:var(--white)}
.tc:hover{border-color:var(--gold)}
.tc.sel{border-color:var(--gold);background:var(--gold-bg)}
.tc input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);flex-shrink:0;margin-top:2px;cursor:pointer}
.tc-name{font-size:.83rem;font-weight:700;color:var(--navy);margin-bottom:3px}
.tc-role{font-size:.7rem;color:var(--muted);line-height:1.4}

/* UPLOAD / IMGS */
.upload-area{border:2px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;background:#FAFAFA;position:relative;transition:border .2s}
.upload-area:hover{border-color:var(--gold);background:var(--gold-bg)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-area p{font-size:.78rem;color:var(--muted)}
#imgs-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.tw{position:relative;display:inline-flex}
.tw img{width:64px;height:64px;object-fit:cover;border-radius:6px;border:2px solid var(--border)}
.tw .pico{width:64px;height:64px;background:#FEE2E2;border-radius:6px;border:2px solid #FECACA;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.5rem}
.tw .pico small{font-size:.55rem;color:#DC2626;font-weight:700}
.tw .rm{position:absolute;top:-6px;right:-6px;background:#EF4444;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#ia-res{display:none;margin-top:12px;padding:12px 14px;background:#EFF6FF;border-radius:8px;border:1px solid #BFDBFE;font-size:.78rem;line-height:1.5}
#ia-res h3{color:var(--navy);font-size:.78rem;font-weight:700;margin-bottom:6px}
#ia-res .pergs{margin-top:8px;padding:8px;background:#FEF3C7;border-radius:6px;color:#92400E;font-size:.74rem}

/* BTNS */
.btn{padding:9px 20px;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:opacity .15s;font-family:inherit}
.btn:disabled{opacity:.4;cursor:default}
.btn-p{background:var(--navy2);color:#fff}
.btn-p:hover:not(:disabled){opacity:.88}
.btn-s{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-s:hover:not(:disabled){border-color:var(--gold);color:var(--navy)}
.btn-row{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap}
#btn-gerar{width:100%;padding:15px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:background .2s;font-family:inherit}
#btn-gerar:hover:not(:disabled){background:var(--navy2)}
#btn-gerar:disabled{opacity:.4;cursor:default}
#status{display:none;padding:16px;border-radius:10px;font-size:.84rem;text-align:center;border:1px solid}
#status.load{background:#EFF6FF;border-color:#BFDBFE;color:var(--navy)}
#status.ok{background:#F0FDF4;border-color:#BBF7D0;color:#166534}
#status.err{background:#FEF2F2;border-color:#FECACA;color:#991B1B}
.spin{-display:inline-block;width:16px;height:16px;border:2.5px solid rgba(6,37,61,.15);border-top-color:var(--navy);border-radius:50%;animation:sp .75s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.dl-links}{display:flex;gap:9px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.dl-btn{padding:9px 20px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;text-decoration:none;display:inline-block;font-family:inherit}
.dl-primary{background:var(--navy);color:#fff}
.dl-secondary{background:#F3F4F6;color:var(--text);border:1px solid var(--border)}

/* SETUP MODAL */
#setup-ov{position:fixed;inset:0;background:rgba(6,37,61,.88);z-index:999;display:none;align-items:center;justify-content:center}
#setup-ov.show{display:flex}
.sbox{background:#fff;border-radius:16px;padding:28px;max-width:440px;width:90%}
.sbox h2{color:var(--navy);font-size:1.05rem;font-weight:700;margin-bottom:8px}
.sbox␀p{font-size:.8rem;color:var(--muted);margin-bottom:16px;line-height:1.55}
.sbox .field{margin-bottom:14px}
.sbox small{display:block;font-size:.68rem;color:var(--muted);margin-top:4px}
#logo-prev{max-height:56px;max-width:220px;display:none;margin-top:8px;border:1px solid var(--border);border-radius:6px;padding:4px}
.tabs{display:flex;gap:0;margin-bottom:20px;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.tab{flex:1;padding:8px;font-size:.78rem;font-weight:600;cursor:pointer;background:transparent;border:none;color:var(--muted);font-family:inherit;transition:all .15s}
.tab.active{background:var(--navy);color:#fff}
.hdr-logo{display:flex;align-items:center;flex-shrink:0}
.hdr-sep{width:1px;height:36px;background:rgba(255,255,255,.15);margin:0 8px}

<body>

<div id="setup-ov">

        <div class="upload-area" style="cursor:pointer">

          <p>Clique para selecionar o logo</p>

        <small id="logo-status">Nenhum logo carregado. O .docx será gerado sem logo no cabeçalho.</small>

    <button class="btn btn-p" style="width:100%;margin-top:4px" onclick="salvarSetup()">Salvar e continuar</button>
  </div>
</div>

<div class="hdr">
  <div class="hdr-logo">
    <svg viewBox="30 70 400 115" height="44" xmlns="http://www.w3.org/2000/svg"><g fill="#fff"><polygon points="77.02 74.64 37.14 86.58 37.14 135.53 40.03 136.4 40.03 88.65 75.68 77.99 76.31 147.26 77.02 147.47 77.72 147.26 78.41 77.99 114.02 88.65 114.02 136.4 116.91 135.53 116.91 86.58 77.02 74.64"/><polygon points="77.03 180.48 37.14 168.54 37.14 143.05 40.03 143.92 40.03 166.47 75.71 177.13 76.31 154.78 77.02 155 77.72 154.79 78.34 177.13 114.02 166.47 114.02 143.92 116.91 143.05 116.91 168.54 77.03 180.48"/><polygon points="70.26 84.13 44.43 92.06 44.23 91.38 70.26 84.13"/><polygon points="46.64 90.84 46.29 131.3 45.93 90.84 46.64 90.84"/><polygon points="44.68 91.72 44.33 134.2 43.97 91.72 44.68 91.72"/><polygon points="71.78 167.12 45.54 160.07 45.74 159.39 71.78 167.12"/><polygon points="71.78 170.99 45.27 163.58 45.47 162.9 71.78 170.99"/><polygon points="45.02 163.24 45.37 135.41 45.73 163.24 45.02 163.24"/><polygon points="70.3 88.06 44.38 95.72 44.19 95.04 70.3 88.06"/><polygon points="83.79 84.13 109.82 91.38 109.63 92.06 83.79 84.13"/><polygon points="108.12 90.84 107.76 131.3 107.41 90.84 108.12 90.84"/><polygon points="110.08 91.72 109.72 134.2 109.37 91.72 110.08 91.72"/><polygon points="81.45 167.12 108.32 159.39 108.5 160.08 81.45 167.12"/><polygon points="81.45 170.99 108.58 162.9 108.77 163.58 81.45 170.99"/><polygon points="108.32 163.24 108.68 135.41 109.03 163.24 108.32 163.24"/><polygon points="83.75 88.06 109.86 95.04 109.67 95.72 83.75 88.06"/></g><text transform="translate(143.71 124.59) scale(1 .9)" fill="#fff" font-family="Montserrat-Medium,Montserrat,sans-serif" font-size="28.35" font-weight="500">MESTRE ENGENHARIA</text><text transform="translate(142.2 151.36)" fill="#fff" font-family="CenturyGothic,'Century Gothic',sans-serif" font-size="17.01" letter-spacing=".2em">AVALIAÇÕES E PERÍCIAS</text></svg>
  </div>
  <div class="hdr-sep"></div>
  <div>
    <h1>Gerador de Propostas</h1>
    <span>Itajaí · SC</span>

  <button class="hdr-key" onclick="abrirSetup()">⚙ Config</button>

<main>

<!-- 1. BRIEFING -->
<div class="card">
  <div class="sec-hdr"><span class="sec-ico">🤖</span><span class="sec-ttl">Briefing Inteligente</span><span class="lbl-opt" style="margin-left:auto;font-size:.7rem;color:var(--muted)">opcional</span></div>
  <div class="field">
    <label>Texto, e-mail ou anotações</label>
    <p class="hint">Cole qualquer informação sobre o serviço. A IA preenche o formulário automaticamente.</p>
    <textarea id="txt-briefing" placeholder="Ex: O cliente João Silva precisa de uma avaliação do imóvel localizado na Rua das Flores, 100 – Itajaí, área de 280 m², fins de inventário. Valor esperado em torno de R$ 1.200,00..." rows="4"></textarea>
  </div>
  <div class="field">
    <label>Imagens, prints ou PDFs <span class="lbl-opt">opcional</span></label>
    <p class="hint">Anexe prints de WhatsApp, e-mail, documentos ou PDFs. A IA lê o conteúdo automaticamente.</p>
    <div class="upload-area">
      <input type="file" accept="image/*,application/pdf" multiple onchange="carregarArquivos(this)">
      <p>+ Clique ou arraste arquivos · PNG, JPG, PDF · múltiplos permitidos</p>
    </div>
    <div id="imgs-preview"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-p" id="btn-extrair" onclick="extrairBriefing()">⚡ Analisar com IA</button>
    <button class="btn btn-s" onclick="limparBriefing()">Limpar</button>
  </div>
  <div id="ia-res"></div>
</div>

<!-- 2. TIPO -->
<div class="card">
  <div class="sec-hdr"><span class="sec-ico">📋</span><span class="sec-ttl">Tipo de Serviço</span></div>
  <div class="chips" id="tipo-chips"></div>
</div>

<!-- 3. DADOS -->
<div class="card">
  <div class="sec-hdr"><span class="sec-ico">📝</span><span class="sec-ttl">Dados da Proposta</span></div>
  <div class="row3 field">
    <div><label>Número da proposta</label><input type="number" id="numero" placeholder="225" min="1"></div>
    <div><label>Ano</label><input type="number" id="ano" placeholder="2026"></div>
    <div><label>Data da proposta</label><input type="date" id="data_prop"></div>
  </div>
  <div class="field">
    <label>Destinatário / Empresa contratante</label>
    <p class="hint">Inclua a preposição: "do Sr. João Silva" ou "da Construtora ABC Ltda." ou "da Prefeitura de..."</p>
    <input type="text" id="destinatario" placeholder="do Sr. / da Sra. / da Empresa ABC Ltda.">
  </div>
  <div class="field">
    <label>Imóvel / Objeto do serviço</label>
    <textarea id="detalhes" rows="2" placeholder="Endereço, área, matrícula, finalidade do serviço..."></textarea>
  </div>
</div>

<!-- 4. HONORÁRIOS -->
<div class="card" id="honorarios-card">
  <div class="sec-hdr"><span class="sec-ico">💰</span><span class="sec-ttl">Honorários e Pagamento</span></div>
  <div class="field">
    <label>Modo de preço</label>
    <div class="chips" style="margin-top:6px">
      <span class="chip sel" id="modo-unico" onclick="setModoPreco('unico',this)">Valor único</span>
      <span class="chip" id="modo-planos" onclick="setModoPreco('planos',this)">3 Planos — Mestre 30D / 15D / 7D</span>
    </div>
  </div>
  <div id="area-unico" class="field">
    <label>Valor Total</label>
    <input type="text" id="valor" placeholder="ex: 3.500,00" oninput="fmtValor(this)" onfocus="garantirRS(this)">
    <div class="price-chips" id="price-chips"></div>
  </div>
  <div id="area-planos" style="display:none">
    <p class="hint" style="margin-bottom:10px">Prazos fixos: 30D = vistoria 10d + laudo 30d · 15D = vistoria 5d + laudo 15d · 7D = vistoria 2d + laudo 7d</p>
    <div class="row3" style="margin-bottom:14px">
      <div><label>Mestre 30D <span class="lbl-opt">Econômico</span></label><input type="text" id="plano30" placeholder="ex: R$ 5.490,00" oninput="fmtValor(this)" onfocus="garantirRS(this)"></div>
      <div><label>Mestre 15D <span class="lbl-opt">Padrão</span></label><input type="text" id="plano15" placeholder="ex: R$ 6.830,00" oninput="fmtValor(this)" onfocus="garantirRS(this)"></div>
      <div><label>Mestre 7D <span class="lbl-opt">Prioritário</span></label><input type="text" id="plano7" placeholder="ex: R$ 8.490,00" oninput="fmtValor(this)" onfocus="garantirRS(this)"></div>
    </div>
  </div>
  <div class="field">
    <label>Forma de Pagamento</label>
    <input type="text" id="pagamento" placeholder="Selecione abaixo ou escreva...">
    <div class="chips">
      <span class="chip" onclick="selChip('pagamento',this,'50% entrada + 50% na entrega do laudo')">50% entrada + 50% entrega</span>
      <span class="chip" onclick="selChip('pagamento',this,'100% antecipado na assinatura da proposta')">100% antecipado na assinatura</span>
      <span class="chip" onclick="selChip('pagamento',this,'100% na entrega do laudo')">100% na entrega do laudo</span>
      <span class="chip" onclick="selChip('pagamento',this,'30% na assinatura + 70% na entrega do laudo')">30% na assinatura + 70% na entrega</span>
      <span class="chip" onclick="selChip('pagamento',this,'2x sem juros: entrada + 30 dias')">2x sem juros (entrada + 30 dias)</span>
      <span class="chip" onclick="selChip('pagamento',this,'3x iguais sem juros')">3x iguais sem juros</span>
    </div>
  </div>
  <div class="field">
    <label>Informações de Pagamento <span class="lbl-opt">opcional</span></label>
    <input type="text" id="obs_pagamento" placeholder="Selecione abaixo ou escreva...">
    <div class="chips">
      <span class="chip" onclick="selChip('obs_pagamento',this,'PIX — CNPJ: 39.971.644/0001-62 (Mestre Engenharia)')">PIX — CNPJ Mestre Engenharia</span>
      <span class="chip" onclick="selChip('obs_pagamento',this,'TED/DOC — dados bancários a confirmar')">TED/DOC — dados a confirmar</span>
      <span class="chip" onclick="selChip('obs_pagamento',this,'Cartão de crédito via InfinitePay (link de pagamento)')">Cartão de crédito via InfinitePay</span>
      <span class="chip" onclick="selChip('obs_pagamento',this,'Boleto bancário (prazo de compensação 3 dias úteis)')">Boleto bancário (prazo 3 dias úteis)</span>
    </div>
  </div>
</div>

<!-- 5. PRAZO E VALIDADE -->
<div class="card">
  <div class="sec-hdr"><span class="sec-ico">📅</span><span class="sec-ttl">Prazo e Validade</span></div>
  <div class="row2">
    <div>
      <label>Prazo de Entrega <span class="lbl-opt">(dias úteis após a vistoria)</span></label>
      <input type="text" id="prazo" placeholder="ex: 15 dias úteis após a vistoria" style="margin-bottom:8px">
      <div class="num-chips">
        <span class="nc" onclick="selNum('prazo',this,'3 dias úteis')">3</span>
        <span class="nc" onclick="selNum('prazo',this,'5 dias úteis')">5</span>
        <span class="nc" onclick="selNum('prazo',this,'7 dias úteis')">7</span>
        <span class="nc" onclick="selNum('prazo',this,'10 dias úteis')">10</span>
        <span class="nc" onclick="selNum('prazo',this,'15 dias úteis')">15</span>
        <span class="nc" onclick="selNum('prazo',this,'20 dias úteis')">20</span>
        <span class="nc" onclick="selNum('prazo',this,'30 dias úteis')">30</span>
        <span class="nc" onclick="selNum('prazo',this,'45 dias úteis')">45</span>
        <span class="nc" onclick="selNum('prazo',this,'60 dias úteis')">60</span>

function renderTipos(){
  var c = document.getElementById('tipo-chips');
  Object.keys(TIPOS).forEach(function(k){
    var d = document.createElement('span');
    d.className='chip'; d.textContent=TIPOS[k].label;
    d.onclick=function(){ selecionarTipo(k,d); };
    c.appendChild(d);
  });
}

function selecionarTipo(key,el){
  tipoSel=key;
  document.querySelectorAll('#tipo-chips .chip').forEach(function(c){c.classList.remove('sel');});
  el.classList.add('sel');
  var t=TIPOS[key];
  var pEl=document.getElementById('prazo');
  if(!pEl.value||pEl.value===pEl.placeholder) pEl.value=t.prazo_def;
  pEl.placeholder=t.prazo_def;
  document.getElementById('validade').value=t.val_def||30;
  document.querySelectorAll('.nc[data-field="validade"]').forEach(function(n){n.classList.remove('sel');});
  document.querySelectorAll('.nc').forEach(function(n){
    if(n.getAttribute('data-fld')==='validade'&&parseInt(n.textContent)===t.val_def) n.classList.add('sel');
  });
  var pc=document.getElementById('price-chips');
  pc.innerHTML='';
  (t.precos||[]).forEach(function(p){
    var s=document.createElement('span');
    s.className='pc'; s.textContent=p.l+' → '+p.v;
    s.onclick=function(){ document.getElementById('valor').value=p.v.startsWith('R$')?p.v:'R$ '+p.v; };
    pc.appendChild(s);
  });
}

function abrirSetup(){ document.getElementById('setup-ov').classList.add('show'); }
function setupTab(name,el){

function carregarLogo(input){
  if(!input.files[0]) return;
  var r=new FileReader();
  r.onload=function(e){
    document.getElementById('logo-prev').src=e.target.result;
    document.getElementById('logo-prev').style.display='block';
    document.getElementById('logo-status').textContent='Logo carregado. Salve para confirmar.';
    window._logoTemp=e.target.result;
  };
  r.readAsDataURL(input.files[0]);
}
function salvarSetup(){
  var k=document.getElementById('api-key-input').value.trim();
  if(k){
    if(!k.startsWith('sk-')){ alert('Chave inválida (deve começar com "sk-")'); return; }
    localStorage.setItem('mestre_api_key',k);
  }
  if(window._logoTemp) localStorage.setItem('mestre_logo_b64',window._logoTemp);
  document.getElementById('setup-ov').classList.remove('show');
}

// ─── IMAGENS ─────────────────────────────────────────────────────────────────
function carregarArquivos(input){ Array.from(input.files).forEach(function(f){lerArquivo(f,f.type);}); input.value=''; }
function lerArquivo(file,mime){
  var r=new FileReader();
  r.onload=function(e){
    var du=e.target.result;
    var m=(du.match(/^data:([^;]+);base64,/)||[])[1]||mime||'image/png';
    imgLista.push({base64:du.replace(/^data:[^;]+;base64,/,''),mimeType:m,dataUrl:du});
    renderImagens();
  };
  r.readAsDataURL(file);
}
function renderImagens(){
  var c=document.getElementById('imgs-preview'); c.innerHTML='';
  imgLista.forEach(function(a,i){
    var w=document.createElement('div'); w.className='tw';
    if(a.mimeType==='application/pdf'){
      w.innerHTML='<div class="pico"><span>📄</span><small>PDF</small></div>';
    } else {
      var img=document.createElement('img'); img.src=a.dataUrl; w.appendChild(img);
    }
    var rm=document.createElement('button'); rm.className='rm'; rm.textContent='×';
    rm.onclick=(function(idx){return function(){imgLista.splice(idx,1);renderImagens();};})(i);
    w.appendChild(rm); c.appendChild(w);
  });

async function svgToArrayBuffer(svgStr,w,h){
  return new Promise(function(resolve){
    var canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    var ctx=canvas.getContext('2d');
    var img=new Image();
    var blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    img.onload=function(){
      ctx.clearRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      canvas.toBlob(function(b){
        if(!b){resolve(null);return;}
        var fr=new FileReader();
        fr.onload=function(e){
          var b64=e.target.result.replace(/^data:[^;]+;base64,/,'');
          var bin=atob(b64);
          var arr=new Uint8Array(bin.length);
          for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
          resolve(arr.buffer);
        };
        fr.readAsDataURL(b);
      },'image/png');
    };
    img.onerror=function(){resolve(null);};
    img.src=url;
  });
}

// ─── CLAUDE API ──────────────────────────────────────────────────────────────
async function callClaude(messages,maxTokens){
  var key=localStorage.getItem('mestre_api_key');
  if(!key) throw new Error('Configure a chave da API Claude (botão ⚙ Config).');
  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens||600,messages:messages})
  });
  var data=await resp.json();
  if(!resp.ok) throw new Error(data.error?.message||'Erro API '+resp.status);
  return data.content[0].text.trim();
}

// ─── VALOR POR EXTENSO ───────────────────────────────────────────────────────
function valorExtenso(valorStr){
  var limpo=String(valorStr||'').replace(/R\$\s*/gi,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.');
  var num=parseFloat(limpo);
  if(isNaN(num)||num<=0) return '';
  var un=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  var dz=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  var cn=['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  function m100(n){if(n<20)return un[n];var r=n%10;return r?dz[Math.floor(n/10)]+' e '+un[r]:dz[Math.floor(n/10)];}
  function m1000(n){if(n===100)return 'cem';if(n<100)return m100(n);var r=n%100;return r?cn[Math.floor(n/100)]+' e '+m100(r):cn[Math.floor(n/100)];}
  function mM(n){if(n<1000)return m1000(n);var m=Math.floor(n/1000),r=n%1000;var mil=m===1?'mil':m1000(m)+' mil';return r?mil+(r<100?' e ':', ')+m1000(r):mil;}
  var inteiro=Math.floor(num),cents=Math.round((num-inteiro)*100),partes=[];
  if(inteiro>=1000000){var mi=Math.floor(inteiro/1000000),ri=inteiro%1000000;partes.push(m1000(mi)+(mi===1?' milhão':' milhões'));if(ri)partes.push(mM(ri));}
  else if(inteiro>0)partes.push(mM(inteiro));
  var t=(partes.join(', ')||'zero').toUpperCase();
  t+=inteiro===1?' REAL':' REAIS';
  if(cents>0)t+=' E '+m100(cents).toUpperCase()+(cents===1?' CENTAVO':' CENTAVOS');
  return '('+t+')';
}

// ─── UTILIDADES ──────────────────────────────────────────────────────────────
function formatarData(iso){
  var p=iso.split('-');
  var m=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return parseInt(p[2])+' de '+m[parseInt(p[1])-1]+' de '+p[0];
}
function formatarDataHoje(){
  var h=new Date();
  var m=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return h.getDate()+' de '+m[h.getMonth()]+' de '+h.getFullYear();
}
